version: '3.9'
services:
  backend:
    build:
      context: ./Portfolio.Api
      dockerfile: Dockerfile
    ports:
      - "5282:5282"
    environment:
      - ASPNETCORE_URLS=http://+:5282
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api/
    ports:
      - "5173:80"
    depends_on:
      - backend
